<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- sfondo -->
  <rect width="400" height="400" fill="#111111"/>
  <!-- bordo sottile -->
  <rect x="1" y="1" width="398" height="398" rx="0" fill="none" stroke="#1f2937" stroke-width="2"/>
  <!-- cerchio glow sfumato -->
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#g)"/>
  <!-- icona immagine stilizzata -->
  <rect x="140" y="150" width="120" height="90" rx="12" fill="none" stroke="#2a3a4a" stroke-width="2.5"/>
  <circle cx="168" cy="178" r="10" fill="#2a3a4a"/>
  <path d="M140 215 l35-35 25 25 20-20 40 45" fill="none" stroke="#2a3a4a" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- testo sotto -->
  <text x="200" y="272" font-family="system-ui,sans-serif" font-size="11" fill="#374151" text-anchor="middle" letter-spacing="3">IMMAGINE NON DISPONIBILE</text>
</svg>
