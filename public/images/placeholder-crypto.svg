<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#09090b"/>
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="rgba(0,255,148,0.08)"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#dots)"/>
  <!-- Hex ring -->
  <polygon points="200,120 255,150 255,210 200,240 145,210 145,150" fill="none" stroke="rgba(0,255,148,0.2)" stroke-width="1"/>
  <polygon points="200,140 242,163 242,207 200,230 158,207 158,163" fill="none" stroke="rgba(0,255,148,0.3)" stroke-width="1"/>
  <!-- Lock body -->
  <rect x="174" y="185" width="52" height="44" rx="5" fill="none" stroke="rgba(0,255,148,0.55)" stroke-width="1.5"/>
  <!-- Lock shackle -->
  <path d="M183 185 v-18 a17 17 0 0 1 34 0 v18" fill="none" stroke="rgba(0,255,148,0.55)" stroke-width="1.5"/>
  <!-- Keyhole -->
  <circle cx="200" cy="207" r="6" fill="none" stroke="rgba(0,255,148,0.6)" stroke-width="1.2"/>
  <line x1="200" y1="213" x2="200" y2="223" stroke="rgba(0,255,148,0.6)" stroke-width="1.2"/>
  <!-- Circuit traces -->
  <line x1="145" y1="200" x2="115" y2="200" stroke="rgba(0,255,148,0.2)" stroke-width="1"/>
  <line x1="255" y1="200" x2="285" y2="200" stroke="rgba(0,255,148,0.2)" stroke-width="1"/>
  <circle cx="110" cy="200" r="3" fill="rgba(0,255,148,0.3)"/>
  <circle cx="290" cy="200" r="3" fill="rgba(0,255,148,0.3)"/>
  <text x="200" y="310" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(0,255,148,0.3)" letter-spacing="4">CRYPTO WALLETS</text>
</svg>
