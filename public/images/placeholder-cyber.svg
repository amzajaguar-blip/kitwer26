<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#09090b"/>
  <defs>
    <pattern id="circuit" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M0 20 h15 M25 20 h15 M20 0 v15 M20 25 v15" stroke="rgba(255,68,68,0.07)" stroke-width="1" fill="none"/>
      <circle cx="20" cy="20" r="2" fill="rgba(255,68,68,0.06)"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#circuit)"/>
  <!-- Shield outline -->
  <path d="M200 130 L260 158 L260 210 C260 248 232 278 200 288 C168 278 140 248 140 210 L140 158 Z" fill="none" stroke="rgba(255,68,68,0.45)" stroke-width="1.5"/>
  <!-- Shield inner -->
  <path d="M200 148 L246 170 L246 210 C246 238 226 260 200 270 C174 260 154 238 154 210 L154 170 Z" fill="none" stroke="rgba(255,68,68,0.2)" stroke-width="1"/>
  <!-- Circuit lines from shield -->
  <line x1="140" y1="200" x2="100" y2="200" stroke="rgba(255,68,68,0.2)" stroke-width="1"/>
  <line x1="100" y1="200" x2="100" y2="160" stroke="rgba(255,68,68,0.2)" stroke-width="1"/>
  <circle cx="100" cy="157" r="3" fill="rgba(255,68,68,0.35)"/>
  <line x1="260" y1="200" x2="300" y2="200" stroke="rgba(255,68,68,0.2)" stroke-width="1"/>
  <line x1="300" y1="200" x2="300" y2="240" stroke="rgba(255,68,68,0.2)" stroke-width="1"/>
  <circle cx="300" cy="243" r="3" fill="rgba(255,68,68,0.35)"/>
  <!-- Shield checkmark -->
  <path d="M183 207 L195 220 L220 192" fill="none" stroke="rgba(255,68,68,0.6)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Scan line animation hint -->
  <line x1="140" y1="180" x2="260" y2="180" stroke="rgba(255,68,68,0.08)" stroke-width="1"/>
  <line x1="140" y1="220" x2="260" y2="220" stroke="rgba(255,68,68,0.08)" stroke-width="1"/>
  <text x="200" y="312" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(255,68,68,0.3)" letter-spacing="4">CYBER SECURITY</text>
</svg>
