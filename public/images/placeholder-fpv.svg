<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#09090b"/>
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(0,212,255,0.08)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#grid)"/>
  <!-- Center glow -->
  <circle cx="200" cy="200" r="120" fill="none" stroke="rgba(0,212,255,0.12)" stroke-width="1"/>
  <circle cx="200" cy="200" r="80" fill="none" stroke="rgba(0,212,255,0.08)" stroke-width="1"/>
  <!-- Drone body -->
  <rect x="175" y="185" width="50" height="30" rx="4" fill="none" stroke="rgba(0,212,255,0.5)" stroke-width="1.5"/>
  <!-- Drone arms -->
  <line x1="175" y1="192" x2="140" y2="165" stroke="rgba(0,212,255,0.4)" stroke-width="1.5"/>
  <line x1="225" y1="192" x2="260" y2="165" stroke="rgba(0,212,255,0.4)" stroke-width="1.5"/>
  <line x1="175" y1="208" x2="140" y2="235" stroke="rgba(0,212,255,0.4)" stroke-width="1.5"/>
  <line x1="225" y1="208" x2="260" y2="235" stroke="rgba(0,212,255,0.4)" stroke-width="1.5"/>
  <!-- Rotors -->
  <ellipse cx="135" cy="162" rx="20" ry="5" fill="none" stroke="rgba(0,212,255,0.45)" stroke-width="1"/>
  <ellipse cx="265" cy="162" rx="20" ry="5" fill="none" stroke="rgba(0,212,255,0.45)" stroke-width="1"/>
  <ellipse cx="135" cy="238" rx="20" ry="5" fill="none" stroke="rgba(0,212,255,0.45)" stroke-width="1"/>
  <ellipse cx="265" cy="238" rx="20" ry="5" fill="none" stroke="rgba(0,212,255,0.45)" stroke-width="1"/>
  <!-- Center dot -->
  <circle cx="200" cy="200" r="4" fill="rgba(0,212,255,0.6)"/>
  <!-- Label -->
  <text x="200" y="310" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(0,212,255,0.35)" letter-spacing="4">FPV DRONES</text>
</svg>
